<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Covered Call Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: sans-serif; 
            background: #0b1120; 
            color: #e5e7eb; 
            margin: 0; 
            padding: 20px; 
        }
        .card { 
            background: #111827; 
            padding: 20px; 
            border-radius: 10px; 
            max-width: 600px; 
            margin: auto; 
        }
        input, select { 
            width: 100%; 
            padding: 10px; 
            margin-top: 6px; 
            margin-bottom: 14px; 
            border-radius: 6px; 
            border: 1px solid #374151; 
            background: #1f2937; 
            color: #e5e7eb; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            background: #22c55e; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 10px; 
        }
        button:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) { 
            background: #16a34a; 
        }
        .error { 
            background: #7f1d1d; 
            padding: 10px; 
            border-radius: 6px; 
            margin-top: 10px; 
        }
        .result { 
            margin-top: 20px; 
            padding: 15px; 
            background: #1f2937; 
            border-radius: 8px; 
        }
        .row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 6px; 
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Covered Call Calculator</h2>

    <form method="POST">
        <input type="hidden" name="action" id="action">

        <label>Ticker</label>
        <input 
            name="ticker"
            placeholder="e.g., AAPL, TSLA, SPY"
            value="{{ request.form.get('ticker', '') }}"
            required
        >

        <button type="submit" onclick="document.getElementById('action').value='load'">
            Get Expirations
        </button>

        <label>Expiration</label>
        <select name="expiration" id="expirationSelect">
            {% for exp in expirations %}
                <option value="{{ exp }}">{{ exp }}</option>
            {% endfor %}
        </select>

        <label>Risk Level</label>
        <select name="risk" required>
            <option value="very_safe">Very Safe (Δ ≈ 0.10)</option>
            <option value="safe">Safe (Δ ≈ 0.15)</option>
            <option value="moderate" selected>Moderate (Δ ≈ 0.20)</option>
            <option value="aggressive">Aggressive (Δ ≈ 0.25)</option>
            <option value="very_aggressive">Very Aggressive (Δ ≈ 0.30)</option>
        </select>

        <button id="calculateBtn" type="submit" onclick="document.getElementById('action').value='calculate'" disabled>
            Calculate
        </button>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </form>

    {% if result %}
        <div class="result">
            <div class="row"><span>Option:</span><span>{{ result.symbol }}</span></div>
            <div class="row"><span>Strike:</span><span>{{ result.strike }}</span></div>
            <div class="row"><span>Delta:</span><span>{{ result.delta | round(3) }}</span></div>
            <div class="row"><span>Bid / Ask:</span><span>{{ result.bid }} / {{ result.ask }}</span></div>
            <div class="row"><span>Last Price:</span><span>{{ result.last }}</span></div>
        </div>
    {% endif %}
</div>

<script>
    const expirationSelect = document.getElementById('expirationSelect');
    const calculateBtn = document.getElementById('calculateBtn');

    function updateButtonState() {
        calculateBtn.disabled = !expirationSelect.value;
    }

    expirationSelect.addEventListener('change', updateButtonState);

    // Run once on page load (important after Get Expirations)
    updateButtonState();
</script>

</body>
</html>
